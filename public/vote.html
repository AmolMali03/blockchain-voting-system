<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cast Your Vote</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="navbar">
    <h2>🗳 Blockchain Voting</h2>
    <div class="nav-links">
        <a href="index.html">🏠 Home</a>
        <a href="vote.html">🗳 Vote</a>
        <a href="results.html">📊 Results</a>
        <a href="explorer.html">🔎 Explorer</a>
    </div>
</div>

<div class="container">
    <h1>🗳 Cast Your Vote</h1>
    <p>Please enter your Voter ID and select your preferred candidate.</p>

    <div class="card" style="max-width: 500px; margin: 0 auto; text-align: left;">
        <form id="voteForm">
            <label for="voterId"><strong>Voter ID:</strong></label><br>
            <input type="text" id="voterId" required placeholder="Enter your unique Voter ID" style="width: 100%; padding: 10px; margin-top: 5px; margin-bottom: 20px; box-sizing: border-box;">

            <label><strong>Select a Candidate:</strong></label><br>
            <div style="margin-top: 10px; margin-bottom: 20px;">
                <label style="display: block; margin-bottom: 10px; cursor: pointer;">
                    <input type="radio" name="candidate" value="Candidate A" required> 🏛 Candidate A
                </label>
                <label style="display: block; margin-bottom: 10px; cursor: pointer;">
                    <input type="radio" name="candidate" value="Candidate B"> 🌾 Candidate B
                </label>
                <label style="display: block; margin-bottom: 10px; cursor: pointer;">
                    <input type="radio" name="candidate" value="Candidate C"> ⚙ Candidate C
                </label>
            </div>

            <button type="submit" id="submitVoteBtn" style="width: 100%;">✅ Submit Vote</button>
        </form>

        <div id="statusMessage" style="margin-top: 15px; font-weight: bold; text-align: center;"></div>
    </div>
</div>

<script>
// Handle the form submission
document.getElementById('voteForm').addEventListener('submit', async function(event) {
    // Prevent the page from reloading
    event.preventDefault();

    // Get the UI elements
    const submitBtn = document.getElementById('submitVoteBtn');
    const statusMessage = document.getElementById('statusMessage');
    
    // Get the user's input
    const voterId = document.getElementById('voterId').value;
    const candidate = document.querySelector('input[name="candidate"]:checked').value;

    // Put the UI into a "Loading" state
    submitBtn.disabled = true;
    submitBtn.innerText = "⏳ Processing on Blockchain...";
    statusMessage.style.color = "black";
    statusMessage.innerText = "Sending transaction...";

    try {
        // Send the POST request to your backend (THIS WAS THE BROKEN PART!)
        const response = await fetch('/vote', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ voterId: voterId, candidate: candidate })
        });

        // Check if the server responded successfully
        if (!response.ok) {
            throw new Error("Server rejected the vote. You may have already voted.");
        }

        // Show success message
        statusMessage.style.color = "green";
        statusMessage.innerText = "🎉 Vote successfully cast and recorded on the blockchain!";
        
        // Reset the form so they can't easily spam it
        document.getElementById('voteForm').reset();

    } catch (err) {
        // Show error message if the server is down or vote fails
        console.error("Voting error:", err);
        statusMessage.style.color = "red";
        statusMessage.innerText = "⚠️ Error: " + err.message + " (Is the backend running?)";
    } finally {
        // Restore the button
        submitBtn.disabled = false;
        submitBtn.innerText = "✅ Submit Vote";
    }
});
</script>
</body>
</html>
